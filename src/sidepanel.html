<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidebar Note</title>
  <link rel="stylesheet" href="./styles/themes.css" />
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/editor.css" />
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="topbar">
      <button id="btn-menu" class="icon-btn" title="Notes list">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <line x1="3" y1="5" x2="17" y2="5"/>
          <line x1="3" y1="10" x2="17" y2="10"/>
          <line x1="3" y1="15" x2="17" y2="15"/>
        </svg>
      </button>
      <input id="note-title" type="text" placeholder="Untitled" spellcheck="false" />
      <div id="topbar-actions">
        <button id="btn-export" class="icon-btn" title="Export as .md">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12v2a2 2 0 002 2h8a2 2 0 002-2v-2"/>
            <polyline points="5,8 9,12 13,8"/>
            <line x1="9" y1="2" x2="9" y2="12"/>
          </svg>
        </button>
        <button id="btn-theme" class="icon-btn" title="Toggle theme">
          <svg id="icon-theme" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="9" cy="9" r="4"/>
            <line x1="9" y1="1" x2="9" y2="3"/><line x1="9" y1="15" x2="9" y2="17"/>
            <line x1="1" y1="9" x2="3" y2="9"/><line x1="15" y1="9" x2="17" y2="9"/>
            <line x1="3.3" y1="3.3" x2="4.7" y2="4.7"/><line x1="13.3" y1="13.3" x2="14.7" y2="14.7"/>
            <line x1="3.3" y1="14.7" x2="4.7" y2="13.3"/><line x1="13.3" y1="4.7" x2="14.7" y2="3.3"/>
          </svg>
        </button>
        <button id="btn-more" class="icon-btn" title="More options">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
            <circle cx="9" cy="4" r="1.5"/><circle cx="9" cy="9" r="1.5"/><circle cx="9" cy="14" r="1.5"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- More Options Dropdown -->
    <div id="dropdown-more" class="dropdown hidden">
      <button id="btn-pin" class="dropdown-item">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 2l6 0 0 4 2 2 0 1-4 0 0 5-1 1-1-1 0-5-4 0 0-1 2-2z"/>
        </svg>
        <span>Pin note</span>
      </button>
      <button id="btn-duplicate" class="dropdown-item">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="5" width="9" height="9" rx="1.5"/>
          <path d="M3 11V3a1.5 1.5 0 011.5-1.5H11"/>
        </svg>
        <span>Duplicate</span>
      </button>
      <div class="dropdown-divider"></div>
      <button id="btn-delete" class="dropdown-item danger">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2,4 14,4"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/><path d="M12 4v9a1.5 1.5 0 01-1.5 1.5h-5A1.5 1.5 0 014 13V4"/>
        </svg>
        <span>Delete note</span>
      </button>
    </div>

    <!-- Floating Format Toolbar -->
    <div id="format-toolbar" class="hidden">
      <button data-action="bold" title="Bold (⌘B)"><strong>B</strong></button>
      <button data-action="italic" title="Italic (⌘I)"><em>I</em></button>
      <button data-action="underline" title="Underline (⌘U)"><u>U</u></button>
      <button data-action="strike" title="Strikethrough" style="text-decoration:line-through">S</button>
      <button data-action="code" title="Code"><code>&lt;/&gt;</code></button>
      <button data-action="link" title="Link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 8a3 3 0 004 1l1-1a3 3 0 000-4l0 0a3 3 0 00-4 0L6 5"/>
          <path d="M8 6a3 3 0 00-4-1L3 6a3 3 0 000 4l0 0a3 3 0 004 0l1-1"/>
        </svg>
      </button>
    </div>

    <!-- Note List Panel -->
    <div id="note-list-panel" class="panel-hidden">
      <div id="note-list-header">
        <button id="btn-back" class="icon-btn" title="Back to editor">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="15" y1="10" x2="5" y2="10"/>
            <polyline points="10,5 5,10 10,15"/>
          </svg>
        </button>
        <span class="panel-title">Notes</span>
        <div id="note-list-actions">
          <button id="btn-search" class="icon-btn" title="Search notes">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <circle cx="7.5" cy="7.5" r="5"/><line x1="11" y1="11" x2="16" y2="16"/>
            </svg>
          </button>
          <button id="btn-new-note" class="icon-btn" title="New note">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="search-bar" class="hidden">
        <input id="search-input" type="text" placeholder="Search notes..." spellcheck="false" />
      </div>
      <div id="note-list"></div>
      <div id="note-list-empty" class="hidden">
        <p>No notes yet</p>
        <button id="btn-new-note-empty">Create your first note</button>
      </div>
    </div>

    <!-- Editor Area -->
    <div id="editor-container">
      <div id="editor"></div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
